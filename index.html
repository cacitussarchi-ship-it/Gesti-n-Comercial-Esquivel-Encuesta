<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulario de Diagnóstico</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f4f4;
}

header {
    background: #1f2937;
    color: white;
    padding: 20px;
    text-align: center;
}

.container {
    max-width: 700px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    margin-top: 20px;
}

input, textarea, select {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    margin-bottom: 15px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    background: #10b981;
    color: white;
    padding: 15px;
    border: none;
    width: 100%;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}

#resultado {
    display: none;
    text-align: center;
    padding: 30px;
}
</style>
</head>

<body>

<header>
<h1>Formulario de Diagnóstico</h1>
<p>Gestión Comercial Esquivel</p>
<small>Oscar Esquivel</small>
</header>

<div class="container">

<form id="formulario">

<h2>Información General</h2>

<input type="text" placeholder="Nombre del negocio" required>
<input type="text" placeholder="Nombre de quien llena la encuesta" required>
<input type="date" required>

<input type="number" placeholder="¿Cuántos años tiene el negocio?" required>

<select required>
<option value="">Cantidad de empleados</option>
<option>1-2</option>
<option>3-5</option>
<option>6-10</option>
<option>10+</option>
</select>

<input type="text" placeholder="Tipo de muebles" required>

<select required>
<option value="">¿Cómo trabajan?</option>
<option>Solo por pedido</option>
<option>Inventario</option>
<option>Ambos</option>
</select>

<input type="text" placeholder="Cliente ideal" required>

<textarea placeholder="¿Qué los diferencia?" required></textarea>

<input type="number" placeholder="Ticket promedio (cuanto gasta en promedio cada cliente)" required>

<h2>Ventas</h2>

<select required>
<option value="">Origen de clientes</option>
<option>Facebook</option>
<option>Instagram</option>
<option>WhatsApp</option>
<option>Recomendación</option>
<option>Local físico</option>
<option>Todos</option>
</select>

<input type="number" placeholder="Ventas mensuales" required>

<select required>
<option value="">Comportamiento de ventas</option>
<option>Variables</option>
<option>Estables</option>
<option>Temporadas</option>
</select>

<select required>
<option value="">¿Pierden clientes?</option>
<option>No</option>
<option>Precio</option>
<option>Tiempo entrega</option>
<option>Falta seguimiento</option>
</select>

<select required>
<option value="">Tiempo de cierre</option>
<option>Menos de 1 día</option>
<option>1-3 días</option>
<option>Más de 3 días</option>
</select>

<h2>Marketing</h2>

<select required>
<option value="">¿Quién maneja redes?</option>
<option>Yo</option>
<option>Empleado</option>
<option>Agencia</option>
<option>No usamos</option>
</select>

<select required>
<option value="">Frecuencia de publicaciones</option>
<option>Diario</option>
<option>Semanal</option>
<option>Ocasional</option>
<option>Nunca</option>
</select>

<select required>
<option value="">Tipo de contenido</option>
<option>Fotos</option>
<option>Videos</option>
<option>Promociones</option>
<option>Todo</option>
</select>

<select required>
<option value="">¿Generan ventas?</option>
<option>Sí</option>
<option>No</option>
<option>No sabemos</option>
</select>

<select required>
<option value="">Tiempo de respuesta</option>
<option>Inmediato</option>
<option>1 hora</option>
<option>Varias horas</option>
<option>1 día o más</option>
</select>

<select required>
<option value="">¿Invierten en publicidad?</option>
<option>Sí</option>
<option>No</option>
</select>

<input type="number" placeholder="Inversión mensual ₡" required>

<select required>
<option value="">¿Quién maneja ads?</option>
<option>Yo</option>
<option>Agencia</option>
<option>Nadie</option>
</select>

<h2>Operación</h2>

<select required>
<option value="">Tiempo fabricación</option>
<option>Menos de 1 semana</option>
<option>1-2 semanas</option>
<option>Más de 2 semanas</option>
</select>

<input type="text" placeholder="Mayor problema operativo" required>

<select required>
<option value="">¿Rechazan pedidos?</option>
<option>Sí</option>
<option>No</option>
</select>

<select required>
<option value="">¿Tienen catálogo?</option>
<option>Sí</option>
<option>No</option>
</select>

<select required>
<option value="">¿Registran clientes?</option>
<option>Sí</option>
<option>No</option>
</select>

<select required>
<option value="">¿Base de datos?</option>
<option>Sí</option>
<option>No</option>
</select>

<select required>
<option value="">¿Usan CRM? Sistema o app para gestionar clientes</option>
<option>Sí</option>
<option>No</option>
<option>No sé</option>
</select>

<textarea placeholder="¿Cómo hacen seguimiento?" required></textarea>

<button type="submit">Enviar Diagnóstico</button>

</form>

<div id="resultado"></div>

</div>

<script>
document.getElementById("formulario").addEventListener("submit", function(e) {
    e.preventDefault();

    const inputs = document.querySelectorAll("input, select");
    const textareas = document.querySelectorAll("textarea");

    let score = 0;

    if(parseInt(inputs[11].value) > 20) score += 15;
    if(inputs[15].value === "Diario") score += 10;
    if(inputs[18].value === "Sí") score += 10;
    if(inputs[25].value === "Sí") score += 10;
    if(inputs[26].value === "Sí") score += 10;
    if(inputs[27].value === "Sí") score += 10;
    if(textareas[1].value.length > 20) score += 10;

    let nivel = "";
    let mensaje = "";

    if(score <= 40){
        nivel = "🔴 Nivel Bajo";
        mensaje = "Tu negocio tiene oportunidades claras de mejora en ventas y procesos.";
    } else if(score <= 70){
        nivel = "🟡 Nivel Medio";
        mensaje = "Tu negocio tiene potencial, pero necesita optimización.";
    } else {
        nivel = "🟢 Nivel Alto";
        mensaje = "Tu negocio está listo para escalar.";
    }

    const data = {
        negocio: inputs[0].value,
        nombre: inputs[1].value,
        anos: inputs[3].value,
        empleados: inputs[4].value,
        tipoMuebles: inputs[5].value,
        pedidoInventario: inputs[6].value,
        clienteIdeal: inputs[7].value,
        diferenciacion: textareas[0].value,
        ticket: inputs[8].value,
        origen: inputs[9].value,
        ventas: inputs[10].value,
        meses: inputs[11].value,
        perdidas: inputs[12].value,
        cierre: inputs[13].value,
        redes: inputs[14].value,
        frecuencia: inputs[15].value,
        contenido: inputs[16].value,
        ventasRedes: inputs[17].value,
        respuesta: inputs[18].value,
        ads: inputs[19].value,
        inversion: inputs[20].value,
        responsableAds: inputs[21].value,
        fabricacion: inputs[22].value,
        problema: inputs[23].value,
        rechazos: inputs[24].value,
        catalogo: inputs[25].value,
        registro: inputs[26].value,
        baseDatos: inputs[27].value,
        crm: inputs[28].value,
        seguimiento: textareas[1].value
    };

    fetch("https://script.google.com/macros/s/AKfycbx2P8MOXI-p3ywtJNQwlElpJnSbkL0g_iuzwYMjzxYOuLPpuTC_T2qHIkgGaJ-l76n6CQ/exec", {
        method: "POST",
        body: JSON.stringify(data)
    });

    document.getElementById("formulario").style.display = "none";

    document.getElementById("resultado").innerHTML = `
        <h2>✅ ¡Gracias por completar el diagnóstico!</h2>
        <h3>${nivel}</h3>
        <p><strong>Puntuación:</strong> ${score}/100</p>
        <p>${mensaje}</p>

        <p>Estamos preparando un diagnóstico comercial detallado para tu negocio.</p>

        <a href="https://wa.me/50688356653" target="_blank">
            <button>💬 Contactar por WhatsApp</button>
        </a>

        <p style="margin-top:20px;">
        Preguntá por nuestros servicios para hacer crecer tu negocio 🚀
        </p>
    `;

    document.getElementById("resultado").style.display = "block";
});
</script>

</body>
</html>
