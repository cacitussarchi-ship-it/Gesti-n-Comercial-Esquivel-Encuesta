<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulario de Diagnóstico</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f4f4;
}

header {
    background: #1f2937;
    color: white;
    padding: 20px;
    text-align: center;
}

.container {
    max-width: 700px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    margin-top: 20px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    margin-bottom: 15px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    background: #10b981;
    color: white;
    padding: 15px;
    border: none;
    width: 100%;
    border-radius: 8px;
    font-size: 16px;
}

#resultado {
    display: none;
    text-align: center;
    padding: 30px;
}
</style>
</head>

<body>

<header>
<h1>Formulario de Diagnóstico</h1>
<p>Gestión Comercial Esquivel</p>
<small>By Oscar Esquivel</small>
</header>

<div class="container">

<form id="formulario">

<h2>Información General</h2>
<input type="text" placeholder="Nombre del negocio" required>
<input type="text" placeholder="Nombre de quien llena la encuesta" required>
<input type="date" required>
<input type="number" placeholder="Años del negocio" required>
<input type="number" placeholder="Empleados" required>
<input type="text" placeholder="Tipo de muebles" required>
<input type="text" placeholder="Pedido o inventario" required>
<input type="text" placeholder="Cliente ideal (hogares, oficinas, empresas, etc)" required>
<textarea placeholder="Diferenciación (Que hace a su mueblería diferente?)" required></textarea>
<input type="number" placeholder="Ticket promedio (Cuanto gasta en promedio cada cliente)" required>

<h2>Ventas</h2>
<input type="text" placeholder="Origen clientes (Facebook, Instagram, referencias o WhatsApp)" required>
<input type="number" placeholder="Ventas mensuales" required>
<input type="text" placeholder="Meses buenos/malos" required>
<input type="text" placeholder="Pérdida de clientes? Por que?" required>
<input type="text" placeholder="Tiempo de cierre" required>

<h2>Marketing</h2>
<input type="text" placeholder="Quein es el responsable de redes" required>
<input type="text" placeholder="Frecuencia publicación" required>
<input type="text" placeholder="Tipo de contenido" required>
<input type="text" placeholder="Ventas por redes" required>
<input type="text" placeholder="Tiempo respuesta" required>
<input type="text" placeholder="Invierte en ads" required>
<input type="number" placeholder="Inversión mensual" required>
<input type="text" placeholder="Responsable ads" required>

<h2>Operación</h2>
<input type="text" placeholder="Tiempo fabricación" required>
<input type="text" placeholder="Problema principal" required>
<input type="text" placeholder="Rechazos" required>
<input type="text" placeholder="Tienen catálogo o solo mandán fotos de lo que tienen" required>
<input type="text" placeholder="Registran clientes" required>
<input type="text" placeholder="Tienen base de datos" required>
<input type="text" placeholder="Uso de CRM (Sistema de gestión de clientes)" required>

<textarea placeholder="Dan seguimiento a clientes que contactarón" required></textarea>

<button type="submit">Enviar Diagnóstico</button>

</form>

<div id="resultado"></div>

</div>

<script>
document.getElementById("formulario").addEventListener("submit", function(e) {
    e.preventDefault();

    const inputs = document.querySelectorAll("input");
    const textareas = document.querySelectorAll("textarea");

    let score = 0;

    // REGLAS DE PUNTUACIÓN
    if(inputs[11].value > 20) score += 15;
    if(inputs[15].value.toLowerCase().includes("diario")) score += 10;
    if(inputs[19].value.toLowerCase().includes("si")) score += 10;
    if(inputs[25].value.toLowerCase().includes("si")) score += 10;
    if(inputs[26].value.toLowerCase().includes("si")) score += 10;
    if(inputs[27].value.toLowerCase().includes("si")) score += 10;
    if(textareas[1].value.length > 20) score += 10;

    let nivel = "";
    let mensaje = "";

    if(score <= 40){
        nivel = "🔴 Nivel Bajo";
        mensaje = "Tu negocio tiene oportunidades claras de mejora en estructura, ventas y procesos.";
    } else if(score <= 70){
        nivel = "🟡 Nivel Medio";
        mensaje = "Tu negocio tiene buen potencial, pero necesita optimización para crecer.";
    } else {
        nivel = "🟢 Nivel Alto";
        mensaje = "Tu negocio está bien estructurado, ahora el enfoque es escalar.";
    }

    const data = {
        negocio: inputs[0].value,
        nombre: inputs[1].value,
        anos: inputs[3].value
    };

    fetch("https://script.google.com/macros/s/AKfycbx2P8MOXI-p3ywtJNQwlElpJnSbkL0g_iuzwYMjzxYOuLPpuTC_T2qHIkgGaJ-l76n6CQ/exec", {
        method: "POST",
        body: JSON.stringify(data)
    });

    document.getElementById("formulario").style.display = "none";

    document.getElementById("resultado").innerHTML = `
        <h2>✅ Diagnóstico completado</h2>
        <h3>${nivel}</h3>
        <p><strong>Puntuación:</strong> ${score}/100</p>
        <p>${mensaje}</p>

        <p>
        Con esta información estaremos generando un diagnóstico detallado de tu negocio.
        </p>

        <a href="https://wa.me/50688356653" target="_blank">
            <button>💬 Contactar por WhatsApp</button>
        </a>

        <p style="margin-top:20px;">
        Consultanos por nuestros servicios de crecimiento empresarial 🚀
        </p>
    `;

    document.getElementById("resultado").style.display = "block";
});
</script>

</body>
</html>
